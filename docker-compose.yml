# ocaml-docs-ci, post-day11.
#
# Two services:
#   - daemon — runs the ocaml-docs-ci binary. Drives runc directly
#     to build each opam package in a sandboxed container, so it
#     needs --privileged plus access to the host's runc (the
#     debian-12 runc shipped in the image is enough on most kernels;
#     swap to a bind-mount of /usr/bin/runc if the host's is newer).
#   - web — nginx, serving rendered HTML from the day11 cache
#     directly and reverse-proxying everything else (dashboard, job
#     logs, snapshot pages) to the daemon at :8080.
#
# The daemon resolves everything under /home/app (the image's app-user
# HOME). The two profiles it runs are baked into the image at
# /home/app/.day11/profiles by the Dockerfile, so we deliberately do
# NOT bind-mount the whole [.day11] tree (that would shadow them) — the
# individual subdirs [.day11/{cache,snapshots,overlays}] are bind-mounted
# from the host instead. Scratch (TMPDIR) lives *inside* the cache mount
# (/home/app/.day11/cache/tmp): the daemon hardlinks dep layers from the
# cache into scratch when merging, and hardlinks can't cross mounts —
# so scratch must share the cache's mount, not be its own. (The cache,
# overlays and repo volumes are all one host ext4, so the cross-mount
# rename()s the daemon also does still work — rename allows same
# superblock across bind-mounts; hardlink does not.)
# The opam-repository mirrors live on named volumes (also that ext4)
# that the daemon clones into on first run, so a fresh checkout needs
# nothing on the host. Profile JSON, the --remote targets and the
# --github-pin-overlay path all use the same fixed /home/app paths.

services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set to the host user that owns the bind-mounted [~/.day11/]
        # tree (default 1000). Easiest is to drop a [.env] next to
        # this file with [UID=$(id -u)] / [GID=$(id -g)].
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    restart: unless-stopped
    privileged: true
    # The daemon builds (and imports) its base image via the host
    # Docker daemon — [docker build] / [docker create] over the mounted
    # socket below. The socket is group-owned by [docker]; since the
    # daemon runs as the non-root app user, add that group so it can
    # talk to the socket. Find the host's gid with [getent group docker]
    # and set DOCKER_GID in [.env] if it isn't 999.
    group_add:
      - "${DOCKER_GID:-999}"
    init: false   # dumb-init already in the image
    ports:
      - "8080:8080"
    command:
      # Only the lightweight 'quick' profile runs (Jane Street packages,
      # latest version only). The heavier ocaml-odoc-master and oxcaml
      # profiles are still baked into the image (docker/profiles/) but
      # disabled here — add them back to this list to re-enable.
      - --profiles=quick
      - --remote=https://github.com/ocaml/opam-repository.git=/home/app/ocaml/opam-repository
      - --remote=https://github.com/jonludlam/opam-repository-oxcaml=/home/app/oxcaml/opam-repository
      - --github-pin-overlay=https://github.com/ocaml/odoc=/home/app/.day11/overlays/odoc-master
      - --jobs=40
      - --cores-per-build=4
      - --overcommit=2.5
      - --port=8080
    volumes:
      # opam-repository mirrors, on named volumes. These start empty;
      # the daemon's [--remote] step git-clones into them on first run
      # (and fetches thereafter), so nothing needs cloning on the host.
      # The clones persist across container recreation. Ownership is
      # inherited from the user-owned mount points baked in the image.
      - opam-repository-ocaml:/home/app/ocaml
      - opam-repository-oxcaml:/home/app/oxcaml
      # The day11 cache (built layers + rendered HTML). We mount the
      # individual .day11 subdirs (cache, snapshots, overlays, tmp)
      # rather than all of .day11, so the image-baked profiles at
      # /home/app/.day11/profiles stay intact (not shadowed by a mount).
      - ${HOME}/.day11/cache:/home/app/.day11/cache
      # Snapshot history (per-profile run records the web UI renders).
      # Also outside [profiles/], so persisting it is safe.
      - ${HOME}/.day11/snapshots:/home/app/.day11/snapshots
      # github-pin overlay (odoc-master). Bind-mounted from the host so
      # it's on the same ext4 as TMPDIR — otherwise it lands on the
      # container's overlayfs and git rename()s into it fail with EXDEV.
      - ${HOME}/.day11/overlays:/home/app/.day11/overlays
      # OCurrent state (sqlite + per-job logs). Mounted under
      # /var/lib/ocurrent matching the image's WORKDIR.
      - ocurrent-data:/var/lib/ocurrent
      # Daemon scratch lives at TMPDIR=/home/app/.day11/cache/tmp — i.e.
      # *inside* the cache mount above, deliberately not a separate
      # mount. Stack.merge hardlinks (cp --link) dep layers from the
      # cache into scratch, and hardlinks can't cross mount points, so
      # the scratch dir must share the cache's mount.
      # Build/import the base image via the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # HOME stays /home/app (set in the image); the daemon derives
      # ~/.day11/{profiles,cache} from it.
      - OCAMLRUNPARAM=b

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - daemon
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${HOME}/.day11/cache/debian-bookworm-x86_64:/data:ro

volumes:
  ocurrent-data:
  opam-repository-ocaml:
  opam-repository-oxcaml:
