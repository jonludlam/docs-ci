# nginx front-end for ocaml-docs-ci.
#
# Two responsibilities:
#   1. Serve rendered HTML straight from the day11 cache.
#      day11 lays each profile's docs out at
#      [<cache>/html-<profile>/p/<pkg>/<ver>/doc/index.html],
#      and the daemon links to [/profiles/<NAME>/docs/p/<pkg>/<ver>/...].
#      The regex captures (?<profile>) and rewrites the URL onto
#      [/data/html-<profile>/].
#   2. Reverse-proxy everything else to the daemon's web UI on
#      [host.docker.internal:8080] — that's the dashboard, snapshot
#      pages, /job/ log viewer, diff pages, etc.

server {
  listen 80 default_server;
  server_name _;

  # gzip-compressed responses for the static .css, .js, .json that
  # odoc emits. (text/html is gzipped by default; listing it again
  # produces a duplicate-mime warning.)
  gzip on;
  gzip_types text/css text/javascript application/javascript application/json;
  gzip_vary on;

  # Long max body for any large uploads the daemon might surface
  # (e.g. snapshot uploads via the API). Tune as needed.
  client_max_body_size 100M;

  # /profiles/<name>/docs/<rest> — serve from /data/html-<name>/<rest>
  # The named capture survives into [alias].
  location ~ ^/profiles/(?<profile>[^/]+)/docs/(?<docpath>.*)$ {
    alias /data/html-$profile/$docpath;
    # Variables in [alias] disable nginx's built-in 404; do it ourselves.
    if (!-e $request_filename) { return 404; }
    # odoc-generated trees have an [index.html] in every directory;
    # serve it for bare-directory requests.
    index index.html;
  }

  # Everything else: pass to the daemon container by service name
  # (we're on the same compose network).
  location / {
    proxy_pass http://daemon:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Long-running log streams; bump the timeouts so SSE-style
    # responses don't get cut.
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
  }
}
