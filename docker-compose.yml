# ocaml-docs-ci, post-day11.
#
# Two services:
#   - daemon — runs the ocaml-docs-ci binary. Drives runc directly
#     to build each opam package in a sandboxed container, so it
#     needs --privileged plus access to the host's runc (the
#     debian-12 runc shipped in the image is enough on most kernels;
#     swap to a bind-mount of /usr/bin/runc if the host's is newer).
#   - web — nginx, serving rendered HTML from the day11 cache
#     directly and reverse-proxying everything else (dashboard, job
#     logs, snapshot pages) to the daemon at :8080.
#
# Volumes use bind mounts so the host paths in profile JSON
# ([opam_repositories], [html_dir], [.day11/overlays/.../repo])
# resolve unchanged inside the daemon container.

services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Set to the host user that owns the bind-mounted [~/.day11/]
        # tree (default 1000). Easiest is to drop a [.env] next to
        # this file with [UID=$(id -u)] / [GID=$(id -g)].
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    restart: unless-stopped
    privileged: true
    init: false   # dumb-init already in the image
    ports:
      - "8080:8080"
    command:
      - --profiles=ocaml-odoc-master,oxcaml
      - --remote=https://github.com/ocaml/opam-repository.git=${HOME}/ocaml/opam-repository
      - --remote=https://github.com/jonludlam/opam-repository-oxcaml=${HOME}/oxcaml/opam-repository
      - --github-pin-overlay=https://github.com/ocaml/odoc=${HOME}/.day11/overlays/odoc-master
      - --jobs=40
      - --cores-per-build=4
      - --overcommit=2.5
      - --port=8080
    volumes:
      # Bind-mount the host directories at their host paths so the
      # absolute paths recorded in profile JSON files still resolve.
      - ${HOME}/.day11:${HOME}/.day11
      - ${HOME}/ocaml/opam-repository:${HOME}/ocaml/opam-repository
      - ${HOME}/oxcaml/opam-repository:${HOME}/oxcaml/opam-repository
      # OCurrent state (sqlite + per-job logs). Mounted under
      # /var/lib/ocurrent matching the image's WORKDIR.
      - ocurrent-data:/var/lib/ocurrent
      # The daemon's per-build containers live under /tmp/day11_run_*;
      # use an overlay-friendly tmpfs scoped to this container.
      - /tmp/day11:/tmp/day11
    environment:
      - OCAMLRUNPARAM=b
      - HOME=${HOME}

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - daemon
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${HOME}/.day11/cache/debian-bookworm-x86_64:/data:ro

volumes:
  ocurrent-data:
